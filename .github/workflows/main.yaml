name: Main CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 src ci airflow/dags

  dag-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Apache Airflow (DagBag validation)
        run: |
          pip install "apache-airflow==2.8.1" --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.11.txt"

      - name: Validate DAGs (DagBag import_errors)
        run: python ci/validate_dagbag.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ML runtime image (multi-stage Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mlops-lab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Airflow + ML image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.airflow
          push: false
          tags: mlops-airflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
